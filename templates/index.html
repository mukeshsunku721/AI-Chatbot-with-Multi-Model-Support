<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="main-container">
    <!-- side bar -->
    <div class="sidebar">
        <button onclick="newChat()">+ New Chat</button>
        <div id="chat-list"></div>
    </div>
    <!-- Chat area -->
    <div class="chat-container">
    <div class="chat-header">
        <!-- 🤖 Groq AI Chatbot -->
        <div class="left-header">
            <button id="sidebar-toggle">☰</button>
            <span class="title">🤖 AI Assistant</span>
        </div>
        <div class="right-header">
            <div class="model-wrapper">
                <select id="model-selector">
                <option value="llama-3.1-8b-instant">Llama 3.1 (Fast)</option>
                <option value="llama-3.3-70b-versatile">Llama 3.3 (Powerful)</option>
                <option value="qwen/qwen3-32b">Qwen 3 (32B)</option>
            </select>
            </div>
            
            <!-- <span style="font-size:20px; margin-left: 10px;">🤖</span> AI Assistant -->
            <button id="theme-toggle">🌙</button>
        </div>
        

    </div>

    <div id="chat-box" class="chat-box"></div>

    <div class="chat-input">
        <input type="text" id="user-input" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
